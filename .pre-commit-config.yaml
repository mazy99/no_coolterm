default_stages: [pre-commit]

repos:
    # 1. Стандартные проверки для Git (отступы, переводы строк, крупные файлы)
    - repo: https://github.com/pre-commit/pre-commit-hooks
      rev: v4.6.0
      hooks:
        - id: check-yaml
        - id: end-of-file-fixer
        - id: trailing-whitespace
        - id: check-added-large-files

    # 2. Главный инструмент — Ruff (он сделает и сортировку импортов, и линтинг, и форматирование)
    - repo: https://github.com/astral-sh/ruff-pre-commit
      rev: v0.15.20
      hooks:
        - id: ruff
          args: [ --fix ]
        - id: ruff-format
